spring:
  application:
    name: transcript-extractor
  profiles:
    active: dev

youtube:
  api:
    key: ${YOUTUBE_API_KEY:your-api-key-here}

logging:
  level:
    com.danvega.transcripts: DEBUG
    root: INFO
  pattern:
    console: "%d{HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"

---
spring:
  config:
    activate:
      on-profile: dev

logging:
  level:
    com.danvega.transcripts: DEBUG

---
spring:
  config:
    activate:
      on-profile: prod

logging:
  level:
    com.danvega.transcripts: INFO
    root: WARN